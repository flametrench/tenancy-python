name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']

    name: Python ${{ matrix.python }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: flametrench_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TENANCY_POSTGRES_URL: postgresql://postgres:test@localhost:5432/flametrench_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout flametrench/ids-python
        # Bootstrap the upstream `ids` dep from its sibling GitHub repo
        # until v0.2.x is published to PyPI.
        uses: actions/checkout@v4
        with:
          repository: flametrench/ids-python
          ref: v0.2.0rc3
          path: _vendored/ids-python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install ids dep from sibling checkout
        run: pip install ./_vendored/ids-python

      - name: Install package
        run: pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q
